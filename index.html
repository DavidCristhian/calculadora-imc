<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
</head>
<body>
    <form action="#">
        <h1>Tabela IMC</h1>
        <div class="infos">
            <div class="box-info">
                <h3>IMC</h3>
                <p>Menos de 18,5</p>
                <p>Entre 18,5 e 24,9</p>
                <p>Entre 25 e 29,9</p>
                <p>Entre 30 e 34,9</p>
                <p>Entre 35 e 49,9</p>
                <p>Mais do que 40</p>
            </div>
            <div class="box-info">
                <h3>Resultado</h3>
                <p>Abaixo do peso</p>
                <p>Peso normal</p>
                <p>Sobrepeso</p>
                <p>Obesidade grau 1</p>
                <p>Obesidade grau 2</p>
                <p>Obesidade grau 3</p>
            </div>
        </div>

        <h2>Calcule o seu IMC</h2>
        <label for="peso_inp">Peso:</label>
        <input id="peso_inp" type="text">
        <label for="altura_inp">Altura:</label>
        <input id="altura_inp" type="text">
        <input type="submit" value="Teste">

        <div class="display"></div>
    </form>
</body>
</html>
